<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX Studio | 專業 3D 智能估價</title>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --primary: #00d2ff; --accent: #3a7bd5; --success: #4ade80; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.8); }
        body { font-family: sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; }
        nav { background: #0f172a; padding: 15px 50px; border-bottom: 1px solid #1e293b; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        .container { display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
        .preview-section { background: #000; border-radius: 20px; height: 500px; position: relative; border: 1px solid #334155; }
        #canvas-container { width: 100%; height: 100%; }
        .upload-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .control-panel { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
        .form-group { margin-bottom: 15px; }
        select { width: 100%; padding: 10px; background: #1e293b; color: white; border-radius: 10px; border: 1px solid #334155; }
        .info-card { background: #0f172a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .price-amount { font-size: 40px; color: var(--success); text-align: center; margin: 20px 0; font-weight: bold; }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav><div class="logo">SX STUDIO 3D</div></nav>

<div class="container">
    <div class="preview-section">
        <div id="canvas-container"></div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">選擇 STL 檔案</button>
        <input type="file" id="fileInput" hidden accept=".stl">
    </div>

    <div class="control-panel">
        <div class="form-group">
            <label>填充密度</label>
            <select id="infill" onchange="calculate()">
                <option value="0.2">20% 標準</option>
                <option value="0.5">50% 加強</option>
                <option value="1.0">100% 實心</option>
            </select>
        </div>
        <div class="form-group">
            <label>模式 (X2D + AMS)</label>
            <select id="mode" onchange="calculate()">
                <option value="1.0">單色模式</option>
                <option value="1.8">AMS 多色模式</option>
                <option value="2.2">異材質支撐 (雙噴頭)</option>
            </select>
        </div>
        <div class="info-card">
            <div id="size-out">尺寸: -- mm</div>
            <div id="weight-out">重量: 0 g</div>
            <div id="status-out" style="margin-top:5px; font-weight:bold;">等待檔案...</div>
        </div>
        <div class="price-amount">NT$ <span id="price-out">0</span></div>
        <button class="btn-submit" onclick="window.open('https://line.me/ti/p/1789987')">LINE 下單諮詢</button>
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, controls, currentVol = 0, dims = {x:0,y:0,z:0};

    function init() {
        const container = document.getElementById('canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 5000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        let light = new THREE.DirectionalLight(0xffffff, 0.5);
        light.position.set(1, 1, 1);
        scene.add(light);
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(mesh) mesh.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const loader = new THREE.STLLoader();
            const geometry = loader.parse(event.target.result);
            if(mesh) scene.remove(mesh);
            mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({color: 0x00d2ff}));
            geometry.computeBoundingBox();
            const b = geometry.boundingBox;
            dims = { x: (b.max.x-b.min.x).toFixed(1), y: (b.max.y-b.min.y).toFixed(1), z: (b.max.z-b.min.z).toFixed(1) };
            geometry.computeBoundingSphere();
            mesh.position.set(-geometry.boundingSphere.center.x, -geometry.boundingSphere.center.y, -geometry.boundingSphere.center.z);
            scene.add(mesh);
            camera.position.z = geometry.boundingSphere.radius * 2.5;
            currentVol = getVol(geometry);
            calculate();
        };
        reader.readAsArrayBuffer(file);
    };

    function getVol(g) {
        let v = 0;
        const p = g.attributes.position;
        for(let i=0; i<p.count; i+=3) {
            const v1 = new THREE.Vector3(p.getX(i), p.getY(i), p.getZ(i));
            const v2 = new THREE.Vector3(p.getX(i+1), p.getY(i+1), p.getZ(i+1));
            const v3 = new THREE.Vector3(p.getX(i+2), p.getY(i+2), p.getZ(i+2));
            v += v1.dot(v2.cross(v3)) / 6;
        }
        return Math.abs(v) / 1000;
    }

    function calculate() {
        if(!currentVol) return;
        const infill = parseFloat(document.getElementById('infill').value);
        const mode = parseFloat(document.getElementById('mode').value);
        let weight = currentVol * 1.25 * (infill + 0.15);
        let extra = 0, status = "一體成型", sColor = "#4ade80";

        if(dims.x > 256 || dims.y > 256 || dims.z > 260) { extra = 250; status = "需拆件印製"; sColor = "#f87171"; }
        
        let price = Math.ceil((weight * 2.5 * mode) + 35 + extra);
        document.getElementById('price-out').innerText = price < 60 ? 60 : price;
        document.getElementById('weight-out').innerText = "重量: " + weight.toFixed(1) + " g";
        document.getElementById('size-out').innerText = "尺寸: " + dims.x + "x" + dims.y + "x" + dims.z + " mm";
        const st = document.getElementById('status-out');
        st.innerText = status; st.style.color = sColor;
    }

    init();
</script>
</body>
</html>
