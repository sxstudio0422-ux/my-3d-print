<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX Studio - 智能 3D 代印系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); color: #f8fafc; margin: 0; overflow-x: hidden; }
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #1e293b, transparent); }
        .main-container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        
        /* 3D 視窗 */
        #canvas-container { width: 100%; max-width: 600px; height: 400px; background: radial-gradient(#334155, #0f172a); border-radius: 20px; border: 1px solid #334155; position: relative; overflow: hidden; }
        #drop-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #94a3b8; pointer-events: none; text-align: center; }

        /* 控制面板 */
        .control-panel { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-box { background: #0f172a; padding: 10px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 12px; color: #94a3b8; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: var(--primary); }

        select, button { width: 100%; padding: 12px; border-radius: 10px; border: none; margin-top: 10px; }
        select { background: #334155; color: white; }
        .price-display { font-size: 32px; color: #4ade80; font-weight: bold; margin: 20px 0; text-align: center; border-top: 1px solid #334155; padding-top: 20px; }
        .btn-order { background: var(--primary); color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-order:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="header">
    <h1>SX Studio 3D 估價系統</h1>
    <p>上傳模型，即刻預覽</p>
</div>

<div class="main-container">
    <div id="canvas-container" onclick="document.getElementById('fileInput').click()">
        <div id="drop-hint">
            <div style="font-size: 50px;">📦</div>
            點擊或拖入 STL 檔案
        </div>
        <input type="file" id="fileInput" hidden accept=".stl">
    </div>

    <div class="control-panel">
        <h3>列印參數設定</h3>
        
        <label>填充率 (Infill)</label>
        <select id="infill" onchange="calculate()">
            <option value="0.1">10% - 輕量結構</option>
            <option value="0.2" selected>20% - 標準強度</option>
            <option value="0.5">50% - 高強度件</option>
            <option value="1.0">100% - 全實心</option>
        </select>

        <div class="stat-grid">
            <div class="stat-box"><span class="stat-label">預估重量</span><span class="stat-value" id="weight-out">0</span><small>g</small></div>
            <div class="stat-box"><span class="stat-label">難度加權</span><span class="stat-value" id="diff-out">1.0</span></div>
        </div>

        <div class="price-display">NT$ <span id="price-out">0</span></div>
        
        <button class="btn-order" onclick="window.open('你的Line連結')">確認訂單 / 聯絡店長</button>
        <p style="font-size: 12px; color: #64748b; text-align: center; margin-top: 10px;">* 最終報價以店長人工審核為準</p>
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, controls;
    let currentVol = 0;

    // 初始化 3D 視窗
    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, 600/400, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(document.getElementById('canvas-container').clientWidth, 400);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(1, 1, 1);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(mesh) mesh.rotation.y += 0.005;
        renderer.render(scene, camera);
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const loader = new THREE.STLLoader();
            const geometry = loader.parse(event.target.result);
            
            if(mesh) scene.remove(mesh);
            const material = new THREE.MeshPhongMaterial({ color: 0x00d2ff, specular: 0x111111, shininess: 200 });
            mesh = new THREE.Mesh(geometry, material);
            
            // 自動調整模型大小與位置
            geometry.computeBoundingSphere();
            const center = geometry.boundingSphere.center;
            mesh.position.set(-center.x, -center.y, -center.z);
            scene.add(mesh);
            
            camera.position.z = geometry.boundingSphere.radius * 2.5;
            document.getElementById('drop-hint').style.display = 'none';

            // 計算體積
            currentVol = getVolume(geometry) / 1000;
            calculate();
        };
        reader.readAsArrayBuffer(file);
    };

    function getVolume(geometry) {
        let vol = 0;
        const pos = geometry.attributes.position;
        for(let i=0; i<pos.count; i+=3) {
            const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
            const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1));
            const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2));
            vol += v1.dot(v2.cross(v3)) / 6;
        }
        return Math.abs(vol);
    }

    function calculate() {
        if(currentVol === 0) return;
        const infill = parseFloat(document.getElementById('infill').value);
        
        // 你的定價邏輯 (可隨時修改)
        const weight = currentVol * 1.25 * (infill + 0.1); 
        const pricePerGram = 2.5; // 調低單價讓價格親民
        const baseFee = 30;       // 調低基本費
        
        const total = Math.ceil(weight * pricePerGram + baseFee);
        
        document.getElementById('weight-out').innerText = weight.toFixed(1);
        document.getElementById('price-out').innerText = total < 50 ? 50 : total; // 最低消費 50 元
    }

    initThree();
</script>
</body>
</html>
