<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SX Studio | 專業 3D 智能估價系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        :root { --primary: #00d2ff; --accent: #3a7bd5; --success: #4ade80; --warning: #fbbf24; --danger: #f87171; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); color: #e2e8f0; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: rgba(15, 23, 42, 0.9); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { display: grid; grid-template-columns: 1fr 400px; gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; width: 90%; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; padding: 20px; } }
        .preview-section { background: var(--card); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; height: 600px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #canvas-container { width: 100%; height: 100%; cursor: grab; }
        #drop-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #64748b; pointer-events: none; }
        .upload-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #0b0f1a; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4); border: none; }
        .control-panel { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        h2 { margin-top: 0; font-size: 20px; border-left: 4px solid var(--primary); padding-left: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; outline: none; transition: 0.3s; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .info-card { background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 15px; border: 1px solid #1e293b; }
        .info-label { font-size: 12px; color: #64748b; display: block; margin-bottom: 5px; }
        .info-value { font-size: 16px; font-weight: bold; color: var(--primary); }
        .price-section { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #334155; }
        .price-amount { font-size: 48px; font-weight: 800; color: var(--success); margin: 10px 0; }
        .btn-submit { width: 100%; padding: 18px; background: linear-gradient(45deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">SX STUDIO 3D</div>
    <div style="font-size: 14px; color: #64748b;">X2D + AMS 智能報價系統</div>
</nav>

<div class="container">
    <div class="preview-section">
        <div id="canvas-container"></div>
        <div id="drop-hint">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            <p>請上傳您的 STL 圖檔</p>
        </div>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">選擇檔案</button>
        <input type="file" id="fileInput" hidden accept=".stl">
    </div>

    <div class="control-panel">
        <h2>列印參數設定</h2>
        <div class="form-group" style="margin-top: 25px;">
            <label>填充密度 (Infill)</label>
            <select id="infill" onchange="calculate()">
                <option value="0.1">10% (輕量/展示)</option>
                <option value="0.2" selected>20% (結構標準)</option>
                <option value="0.5">50% (高強度)</option>
                <option value="1.0">100% (實心)</option>
            </select>
        </div>
        <div class="form-group">
            <label>列印模式 (X2D 專屬)</label>
            <select id="nozzle-mode" onchange="calculate()">
                <option value="1.0" selected>單色模式 (主噴頭)</option>
                <option value="1.8">AMS 多色模式 (主噴頭)</option>
                <option value="2.2">異材質支撐 (雙噴頭模式)</option>
            </select>
        </div>

        <div class="info-grid">
            <div class="info-card" style="grid-column: span 2;">
                <span class="info-label">模型尺寸 (L x W x H)</span>
                <span class="info-value" id="size-out">-- x -- x -- mm</span>
            </div>
            <div class="info-card">
                <span class="info-label">預估重量</span>
                <span class="info-value" id="weight-out">0</span> <small>g</small>
            </div>
            <div class="info-card">
                <span class="info-label">機台判定</span>
                <span class="info-value" id="diff-out" style="font-size: 13px;">等待檔案</span>
            </div>
        </div>

        <div class="price-section">
            <span style="color: #94a3b8;">預估費用</span>
            <div class="price-amount"><small style="font-size: 20px;">NT$</small> <span id="price-out">0</span></div>
            <button class="btn-submit" onclick="window.open('https://line.me/ti/p/1789987')">立即下單 / 諮詢店長</button>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, mesh, controls, currentVol = 0;
    let dimensions = { x: 0, y: 0, z: 0 };

    function initThree() {
        scene = new THREE.Scene();
        const container = document.getElementById('canvas-container');
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 2000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.SpotLight(0xffffff, 0.8);
        light.position.set(200, 400, 300);
        scene.add(light);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        if(mesh) mesh.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        document.getElementById('drop-hint').innerHTML = "<p>正在解析 3D 模型...</p>";
        reader.onload = (event) => {
            const loader = new THREE.STLLoader();
            const geometry = loader.parse(event.target.result);
            if(mesh) scene.remove(mesh);
            mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0x00d2ff, metalness: 0.5, roughness: 0.2 }));
            geometry.computeBoundingBox();
            const bbox = geometry.boundingBox;
            dimensions = { x: (bbox.max.x-bbox.min.x).toFixed(1), y: (bbox.max.y-bbox.min.y).toFixed(1), z: (bbox.max.z-bbox.min.z).toFixed(1) };
            geometry.computeBoundingSphere();
            const center = geometry.boundingSphere.center;
            mesh.position.set(-center.x, -center.y, -center.z);
            scene.add(mesh);
            camera.position.set(0, geometry.boundingSphere.radius, geometry.boundingSphere.radius * 2.5);
            document.getElementById('drop-hint').style.display = 'none';
            currentVol = getVolume(geometry) / 1000;
            calculate();
        };
        reader.readAsArrayBuffer(file);
    };

    function getVolume(geometry) {
        let vol = 0;
        const pos = geometry.attributes.position;
        for(let i=0; i<pos.count; i+=3) {
            const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
            const v2 = new THREE.Vector3(pos.getX(i+1), pos.getY(i+1), pos.getZ(i+1));
            const v3 = new THREE.Vector3(pos.getX(i+2), pos.getY(i+2), pos.getZ(i+2));
            vol += v1.dot(v2.cross(v3)) / 6;
        }
        return Math.abs(vol);
    }

    function calculate() {
        if(currentVol === 0) return;
        const infill = parseFloat(document.getElementById('infill').value);
        const modeSelect = document.getElementById('nozzle-mode');
        let factor = parseFloat(modeSelect.value);
        const modeName = modeSelect.options[modeSelect.selectedIndex].text;
        
        let splitFee = 0, diff = "一體成型", color = "#4ade80";
        if (dimensions.x > 256 || dimensions.y > 256 || dimensions.z > 260) {
            splitFee = 250; diff = "需拆件印製"; color = "#f87171";
        } else if (modeName.includes("異材質") &&
